# Main HTTPS Server Configuration
server {
    listen 443 ssl; server_name dauntlessathletics.com 
    www.dauntlessathletics.com; ssl_certificate 
    /opt/bitnami/nginx/certs/server.crt; ssl_certificate_key 
    /opt/bitnami/nginx/certs/server.key;
    # Redirect all HTTP requests to HTTPS
    if ($scheme != "https") { return 301 https://$host$request_uri;
    }
    # Main domain root directory
    root /var/www/html; index index.php index.html index.htm;
    
    # Handle WordPress or other dynamic content
    location /api/ {
      proxy_pass http://127.0.0.1:8089/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location / { try_files $uri /index.html;
    }
    # PHP-FPM handling for .php files
    location ~ \.php$ { include fastcgi_params; fastcgi_pass 
        unix:/opt/bitnami/php/var/run/www.sock; fastcgi_param SCRIPT_FILENAME 
        $document_root$fastcgi_script_name; include 
        /opt/bitnami/nginx/conf/fastcgi_params;
    }
    # Deny access to .htaccess files
    location ~ /\.ht { deny all;
    }
    # Include any additional configurations
    include /opt/bitnami/nginx/conf/bitnami/*.conf;
}

